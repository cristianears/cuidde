<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f766e" />
    <title>ditti - Sem conexao</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 420px);
        text-align: center;
      }

      img {
        width: 72px;
        height: 72px;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 24px;
        line-height: 1.2;
      }

      p {
        margin: 0 0 24px;
        color: #475569;
        font-size: 15px;
        line-height: 1.6;
      }

      button {
        border: 0;
        border-radius: 8px;
        background: #0f766e;
        color: white;
        cursor: pointer;
        font: inherit;
        font-weight: 600;
        padding: 12px 18px;
      }

      button:focus-visible {
        outline: 3px solid #5eead4;
        outline-offset: 3px;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/logo.png" alt="ditti" />
      <h1>Sem conexao</h1>
      <p>Nao foi possivel carregar o ditti agora. Verifique sua internet e tente novamente.</p>
      <button type="button" onclick="window.location.reload()">Tentar novamente</button>
    </main>
  </body>
</html>
